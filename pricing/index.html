<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing - Napoleon Bikes</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
}

/* NAV */
nav {
    text-align:center;
    padding:15px;
}
nav a {
    color:white;
    margin:0 15px;
    text-decoration:none;
}

/* TITLE */
h1 {
    text-align:center;
    margin-top:40px;
}

/* CONTAINER */
.container {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    padding:50px;
    flex-wrap:wrap;
}

/* CARD */
.card {
    width:280px;
    height:400px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

/* IMAGE */
.card img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* OVERLAY */
.overlay {
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

/* CONTENT */
.content {
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
}

.price {
    color:orange;
    margin:10px 0;
}

/* BUTTON */
.btn {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:orange;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover {
    transform:scale(1.1);
}

.btn:active {
    transform:scale(0.95);
}

/* POPUP */
.popup {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* POPUP BOX */
.popup-box {
    width:350px;
    padding:35px 30px;
    border-radius:20px;
    background:linear-gradient(145deg,#111,#1a1a1a);
    box-shadow:0 20px 60px rgba(0,0,0,0.9);

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;

    transform:scale(0.85);
    opacity:0;
    animation:popupIn 0.35s ease forwards;
}

/* TITLE */
.popup-box h3 {
    margin-bottom:10px;
}

/* INPUTS */
.popup-box input {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:#222;
    color:white;
    outline:none;
}

/* BUTTON GROUP */
.button-group {
    display:flex;
    gap:15px;
    margin-top:10px;
}

/* BUTTONS */
.popup-box button {
    padding:12px 22px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

/* SUBMIT */
.submit-btn {
    background:orange;
    color:black;
}

.submit-btn:hover {
    transform:scale(1.08);
}

/* CLOSE */
.close-btn {
    background:#333;
    color:white;
}

.close-btn:hover {
    transform:scale(1.08);
}

/* ANIMATION */
@keyframes popupIn {
    to {
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<nav>
    <a href="../">Home</a>
    <a href="../bikes/">Models</a>
    <a href="../pricing/">Pricing</a>
    <a href="../contact/">Contact</a>
</nav>

<h1>Choose Your Machine</h1>

<div class="container">

    <div class="card">
        <img src="../assets/napoleon1.jpg">
        <div class="overlay"></div>
        <div class="content">
            <h2>Napoleon 250</h2>
            <div class="price">₹2.5L</div>
            <button class="btn" onclick="openPopup('Napoleon 250')">Book</button>
        </div>
    </div>

    <div class="card">
        <img src="../assets/napoleon2.webp">
        <div class="overlay"></div>
        <div class="content">
            <h2>Napoleon 500</h2>
            <div class="price">₹4.5L</div>
            <button class="btn" onclick="openPopup('Napoleon 500')">Book</button>
        </div>
    </div>

    <div class="card">
        <img src="../assets/napoleon3.png">
        <div class="overlay"></div>
        <div class="content">
            <h2>Napoleon Pro</h2>
            <div class="price">₹6.0L</div>
            <button class="btn" onclick="openPopup('Napoleon Pro')">Book</button>
        </div>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3 id="bikeName"></h3>

        <input id="name" placeholder="Your Name">
        <input id="email" placeholder="Your Email">

        <div class="button-group">
            <button class="submit-btn" onclick="submitBooking()">Submit</button>
            <button class="close-btn" onclick="closePopup()">Close</button>
        </div>
    </div>
</div>

<script>
let selectedBike = "";

function openPopup(bike){
    selectedBike = bike;
    document.getElementById("bikeName").innerText = bike;

    document.body.style.overflow = "hidden";
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.body.style.overflow = "auto";
    document.getElementById("popup").style.display = "none";
}

function submitBooking(){
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if(name === "" || email === ""){
        alert("Please fill all fields");
        return;
    }

    const form = document.createElement("form");
    form.method = "POST";
    form.action = "../api/booking.php";

    form.innerHTML = `
        <input name="name" value="${name}">
        <input name="email" value="${email}">
        <input name="bike" value="${selectedBike}">
    `;

    document.body.appendChild(form);
    form.submit();
}
</script>

</body>
</html>
